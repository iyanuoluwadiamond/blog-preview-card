<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="style.css"> 
  
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>

<!--Main container-->
<main class="container">

<!--Card container-->
  <article class="card">

    <!--Image container-->
    <img src="assets/images/illustration-article.svg" alt="Article Illustration">


      <!--Card content-->

         <!--Tag section-->
         <span class="tag">Learning</span>

          <!--Date section-->
          <p class="date">Published 21 Dec 2023</p>

          <!--Title section-->
          <h1 class="title">HTML & CSS foundations</h1>

          <!--Description section-->
          <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>

          <!--Author section-->
          <div class="author">
            <img src="assets/images/image-avatar.webp" alt="author avatar">
            <span class="author-name">Greg Hooper</span>
          </div>


  </article>
</main>
   
</body>
</html>
